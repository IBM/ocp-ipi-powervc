# .github/workflows/release.yaml

name: Build and release Go Project

on:
  release:
    types: [created]

jobs:
  release-linux-amd64:
    name: release linux/amd64
    runs-on: ubuntu-latest
    permissions: write-all
    strategy:
      matrix:
        # List of GOOS and GOARCH pairs from `go tool dist list`
        goosarch:
          - 'linux/ppc64le'
          - 'linux/amd64'
    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up Go
      uses: actions/setup-go@v6 # Recommended action to set up Go environment
      with:
        go-version-file: 'go.mod' # Automatically detects the Go version from go.mod

    - name: Build
      run: make build

    - name: Release
      run: make release

    - name: Release binaries
      uses: softprops/action-gh-release@v3
      # https://github.com/softprops/action-gh-release
      with:
        files: |
          dist/ocp-ipi-powervc-darwin-amd64
          dist/ocp-ipi-powervc-darwin-arm64
          dist/ocp-ipi-powervc-linux-amd64
          dist/ocp-ipi-powervc-linux-arm64
          dist/ocp-ipi-powervc-linux-ppc64le
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # Automatically provided secret

    - name: Release scripts
      uses: softprops/action-gh-release@v3
      # https://github.com/softprops/action-gh-release
      with:
        files: |
          scripts/create-cluster.sh
          scripts/delete-cluster.sh
          scripts/console.sh
          scripts/ssh.sh
          scripts/print-stream-json.sh
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # Automatically provided secret
